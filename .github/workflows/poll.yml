name: Poll FortiGate Emails

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (GitHub's minimum)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit & push data changes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Poll Gmail for new FortiGate events
        id: poll
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          python scripts/poll.py && echo "new_data=true" >> $GITHUB_OUTPUT || echo "new_data=false" >> $GITHUB_OUTPUT

      - name: Commit new data
        if: steps.poll.outputs.new_data == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: ingest new FortiGate events [skip ci]"
          git push

      - name: Deploy to Cloudflare Pages
        if: steps.poll.outputs.new_data == 'true'
        run: npx wrangler pages deploy . --project-name zatecka-internet-check --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: c99cc016d12ed9a666d4e2c3f90c58cc
