<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Žatecká — Internet Status</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --text: #e2e8f0;
      --muted: #8892a4;
      --green: #22c55e;
      --green-dim: #166534;
      --red: #ef4444;
      --red-dim: #7f1d1d;
      --yellow: #eab308;
      --orange: #f59e0b;
      --orange-dim: #78350f;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 28px 16px 48px;
    }
    header {
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    h1 { font-size: 1.4rem; font-weight: 700; }
    h1 span { color: var(--muted); font-weight: 400; font-size: 1rem; margin-left: 6px; }
    #last-updated { font-size: 0.78rem; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    #check-status { font-size: 0.78rem; color: var(--muted); }
    #check-status .ok   { color: var(--green); }
    #check-status .fail { color: var(--red); }
    .btn-check {
      font-size: 0.78rem; font-weight: 600;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 5px 12px;
      cursor: pointer; text-decoration: none; white-space: nowrap;
      transition: border-color 0.15s;
    }
    .btn-check:hover { border-color: var(--green); color: var(--green); }

    .container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* ── Status cards ── */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      border-left-width: 4px;
    }
    .status-card.up   { border-left-color: var(--green); }
    .status-card.down { border-left-color: var(--red); }

    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: var(--surface2);
      padding: 3px 9px;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .dot.up   { background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 2s infinite; }
    .dot.down { background: var(--red);   box-shadow: 0 0 5px var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 3px; }
    .card-desc  { font-size: 0.82rem; color: var(--muted); margin-bottom: 16px; }
    .state-label { font-size: 2rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .status-card.up   .state-label { color: var(--green); }
    .status-card.down .state-label { color: var(--red); }
    .since { font-size: 0.78rem; color: var(--muted); }
    .card-meta { display: flex; gap: 20px; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }
    .meta-item { font-size: 0.75rem; color: var(--muted); }
    .meta-item strong { color: var(--text); display: block; font-size: 0.85rem; margin-bottom: 1px; }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .panel-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Uptime table ── */
    .uptime-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .uptime-table th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      padding: 0 12px 10px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .uptime-table td { padding: 10px 12px; border-top: 1px solid var(--border); vertical-align: middle; }
    .uptime-bar-wrap { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 4px; width: 100px; }
    .uptime-bar { height: 100%; border-radius: 3px; }
    .uptime-val { font-weight: 600; font-size: 0.9rem; }
    .c-green  { color: var(--green); }
    .c-yellow { color: var(--yellow); }
    .c-red    { color: var(--red); }

    .badge-iface {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .badge-iface.wan { background: #1e3a5f; color: #60a5fa; }
    .badge-iface.a   { background: #2d1b4e; color: #a78bfa; }

    /* ── Timeline ── */
    .timeline-rows { display: flex; flex-direction: column; gap: 10px; }
    .timeline-row  { display: flex; align-items: center; gap: 12px; }
    .timeline-lbl  { width: 72px; font-size: 0.75rem; color: var(--muted); text-align: right; flex-shrink: 0; }
    .timeline-bar  {
      flex: 1;
      height: 18px;
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      background: var(--surface2);
    }
    .tseg { height: 100%; flex: 1; }
    .tseg.up   { background: var(--green-dim); }
    .tseg.up:hover { background: var(--green); cursor: default; }
    .tseg.warn { background: var(--orange-dim); }
    .tseg.warn:hover { background: var(--orange); cursor: default; }
    .tseg.down { background: var(--red-dim); }
    .tseg.down:hover { background: var(--red); cursor: default; }
    .timeline-dates {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
      padding-left: 84px;
      margin-top: 6px;
    }
    .timeline-legend {
      display: flex;
      gap: 16px;
      padding-left: 84px;
      margin-top: 12px;
      font-size: 0.68rem;
      color: var(--muted);
    }
    .timeline-legend .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: -1px;
    }

    /* ── Incidents ── */
    .incidents-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .incidents-table th {
      text-align: left;
      color: var(--muted);
      font-weight: 500;
      padding: 0 12px 10px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .incidents-table td { padding: 9px 12px; border-top: 1px solid var(--border); }
    .incidents-table tr:hover td { background: var(--surface2); }
    .ev-down { color: var(--red); font-weight: 600; }
    .ev-up   { color: var(--green); }
    .ev-ongoing { color: var(--red); font-size: 0.72rem; margin-left: 6px; }
    .dur { color: var(--muted); font-variant-numeric: tabular-nums; }
    .empty-row td { text-align: center; color: var(--muted); padding: 28px 12px; }
    .pagination { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px 0 4px; font-size: 0.82rem; }
    .pagination button { background: var(--surface2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 14px; cursor: pointer; font-size: 0.78rem; }
    .pagination button:hover { background: var(--border); }
    .pagination button:disabled { opacity: 0.3; cursor: default; }
    .pagination .page-info { color: var(--muted); }
    .iface-filter { display: flex; gap: 6px; margin-left: auto; }
    .iface-filter button { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .iface-filter button:hover { background: var(--border); }
    .iface-filter button.active { background: var(--green); color: var(--bg); border-color: var(--green); }
    .incidents-header { display: flex; align-items: center; }

    @media (max-width: 600px) {
      .status-grid { grid-template-columns: 1fr; }
      .timeline-lbl { width: 40px; font-size: 0.68rem; }
      .timeline-dates { padding-left: 52px; }
      .timeline-legend { padding-left: 52px; flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Žatecká <span>— Internet Status</span></h1>
  <div class="header-right">
    <div id="check-status">Checking…</div>
    <button id="btn-check" class="btn-check">⟳ Check now</button>
  </div>
</header>

<div class="container">
  <div class="status-grid">
    <div class="status-card" id="card-wan"><div style="color:var(--muted);padding:8px">Loading…</div></div>
    <div class="status-card" id="card-a"><div style="color:var(--muted);padding:8px">Loading…</div></div>
  </div>

  <div class="panel">
    <div class="panel-title">Uptime</div>
    <table class="uptime-table">
      <thead>
        <tr>
          <th>Interface</th>
          <th colspan="2">Last 24 h</th>
          <th colspan="2">Last 7 d</th>
          <th colspan="2">Last 30 d</th>
          <th colspan="2">All time</th>
          <th>Downtime 365 d</th>
        </tr>
      </thead>
      <tbody id="uptime-body"></tbody>
    </table>
  </div>

  <div class="panel">
    <div class="panel-title">7-day Timeline (hourly)</div>
    <div class="timeline-rows" id="timeline-rows"></div>
    <div class="timeline-dates" id="timeline-dates"></div>
    <div class="timeline-legend">
      <span><span class="swatch" style="background: var(--green-dim)"></span>No downtime</span>
      <span><span class="swatch" style="background: var(--orange-dim)"></span>1-30 s down</span>
      <span><span class="swatch" style="background: var(--red-dim)"></span>31 s+ down</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">365-day Timeline (daily)</div>
    <div class="timeline-rows" id="timeline-rows-daily"></div>
    <div class="timeline-dates" id="timeline-dates-daily"></div>
    <div class="timeline-legend">
      <span><span class="swatch" style="background: var(--green-dim)"></span>Up (0-30 s)</span>
      <span><span class="swatch" style="background: var(--orange-dim)"></span>Blip (31-60 s)</span>
      <span><span class="swatch" style="background: var(--red-dim)"></span>Outage (61 s+)</span>
    </div>
  </div>

  <div class="panel">
    <div class="incidents-header">
      <div class="panel-title">Incidents</div>
      <div class="iface-filter" id="iface-filter">
        <button class="active" data-iface="all">All</button>
        <button data-iface="wan">WAN</button>
        <button data-iface="a">5G</button>
      </div>
    </div>
    <table class="incidents-table">
      <thead>
        <tr>
          <th>Start</th>
          <th>Interface</th>
          <th>Event</th>
          <th>Duration</th>
        </tr>
      </thead>
      <tbody id="incidents-body"></tbody>
    </table>
    <div class="pagination" id="incidents-pagination"></div>
  </div>
</div>

<script>
const IFACES = {
  wan: { label: 'WAN — Main',   name: 'Internet Praha Josefov', speed: '250/250 Mbps', type: 'Optical', cost: '4 928 CZK/mo', primary: true },
  a:   { label: 'A — Backup',   name: 'O2 5G',                  speed: '100/20 Mbps',  type: '5G',      cost: '599 CZK/mo',   primary: false }
};

// ── Data ─────────────────────────────────────────────────────────────────────

const DATA_BASE = 'https://raw.githubusercontent.com/aftanasmichal/zatecka-internet-check/main/data/';

async function loadEvents() {
  const bust  = `?t=${Math.floor(Date.now() / 60000)}`; // 1-minute cache buster
  const index = await fetch(DATA_BASE + 'index.json' + bust).then(r => r.json());
  const all   = [];
  for (const file of index.files) {
    const d = await fetch(DATA_BASE + file + bust).then(r => r.json());
    all.push(...d.events);
  }
  all.sort((a, b) => new Date(a.ts) - new Date(b.ts));
  return all;
}

// ── Computation ───────────────────────────────────────────────────────────────

function stateAt(events, iface, t) {
  // Last event for iface at or before t
  const prev = events.filter(e => e.iface === iface && new Date(e.ts) <= t);
  return prev.length ? prev[prev.length - 1].to : 'alive';
}

function uptimePct(events, iface, start, end) {
  const win = events.filter(e => e.iface === iface && new Date(e.ts) > start && new Date(e.ts) <= end);
  let state = stateAt(events, iface, start);
  let deadMs = 0, cursor = start;
  for (const ev of win) {
    const t = new Date(ev.ts);
    if (state === 'dead') deadMs += t - cursor;
    state = ev.to;
    cursor = t;
  }
  if (state === 'dead') deadMs += end - cursor;
  const total = end - start;
  return total > 0 ? (total - deadMs) / total * 100 : 100;
}

// ── Formatting ────────────────────────────────────────────────────────────────

const CZ = { timeZone: 'Europe/Prague' };

function fmtPct(p) {
  if (p >= 100) return '100.000%';
  return p.toFixed(3) + '%';
}

function pctColor(p) {
  if (p >= 99)  return 'var(--green)';
  if (p >= 95)  return 'var(--yellow)';
  return 'var(--red)';
}

function pctClass(p) {
  if (p >= 99) return 'c-green';
  if (p >= 95) return 'c-yellow';
  return 'c-red';
}

function fmtTs(date) {
  return date.toLocaleString('cs-CZ', { ...CZ, day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function fmtSince(since) {
  if (!since) return 'since monitoring began';
  const diffM = Math.round((Date.now() - since) / 60000);
  if (diffM < 2)  return 'just now';
  if (diffM < 60) return diffM + ' min ago';
  const h = Math.floor(diffM / 60);
  if (h < 24) return h + ' h ' + (diffM % 60) + ' min ago';
  return Math.floor(h / 24) + ' d ago';
}

function fmtDur(ms) {
  if (!ms || ms < 0) return '—';
  const s = Math.round(ms / 1000);
  if (s < 60) return s + ' s';
  const m = Math.floor(s / 60);
  if (m < 60) return m + ' min ' + (s % 60) + ' s';
  return Math.floor(m / 60) + ' h ' + (m % 60) + ' min';
}

// ── Render: Status cards ──────────────────────────────────────────────────────

function renderCards(events) {
  for (const [id, cfg] of Object.entries(IFACES)) {
    const ifaceEvs = events.filter(e => e.iface === id);
    const last = ifaceEvs[ifaceEvs.length - 1];
    const state = last ? last.to : 'alive';
    const since = last ? new Date(last.ts) : null;
    const isUp = state === 'alive';
    const el = document.getElementById('card-' + id);
    el.className = 'status-card ' + (isUp ? 'up' : 'down');
    el.innerHTML = `
      <div class="badge-status"><span class="dot ${isUp ? 'up' : 'down'}"></span>${isUp ? 'Online' : 'Offline'}</div>
      <div class="card-title">${cfg.label}</div>
      <div class="card-desc">${cfg.name} · ${cfg.primary ? 'Primary' : 'Backup'}</div>
      <div class="state-label">${isUp ? 'UP' : 'DOWN'}</div>
      <div class="since">${isUp ? 'Online' : 'Offline'} · ${fmtSince(since)}</div>
      <div class="card-meta">
        <div class="meta-item"><strong>${cfg.speed}</strong>Speed</div>
        <div class="meta-item"><strong>${cfg.type}</strong>Type</div>
        <div class="meta-item"><strong>${cfg.cost}</strong>Cost/mo</div>
      </div>`;
  }
}

// ── Render: Uptime table ──────────────────────────────────────────────────────

function downtimeMs(events, iface, start, end) {
  const win = events.filter(e => e.iface === iface && new Date(e.ts) > start && new Date(e.ts) <= end);
  let state = stateAt(events, iface, start);
  let dead = 0, cursor = start;
  for (const ev of win) {
    const t = new Date(ev.ts);
    if (state === 'dead') dead += t - cursor;
    state = ev.to;
    cursor = t;
  }
  if (state === 'dead') dead += end - cursor;
  return dead;
}

function fmtDowntime(ms) {
  if (ms <= 0) return '0 s';
  const totalS = ms / 1000;
  if (totalS < 60) return totalS.toFixed(1) + ' s';
  const m = Math.floor(totalS / 60);
  const s = (totalS % 60).toFixed(1);
  if (m < 60) return m + ' min ' + s + ' s';
  const h = Math.floor(m / 60);
  return h + ' h ' + (m % 60) + ' min ' + s + ' s';
}

function renderUptime(events) {
  const now  = new Date();
  const h24  = new Date(now - 86400e3);
  const d7   = new Date(now - 7 * 86400e3);
  const d30  = new Date(now - 30 * 86400e3);
  const d365 = new Date(now - 365 * 86400e3);
  const all  = events.length ? new Date(events[0].ts) : now;

  const body = document.getElementById('uptime-body');
  body.innerHTML = '';

  const cell = (pct) => {
    const col = pctColor(pct);
    return `<td class="uptime-val ${pctClass(pct)}">${fmtPct(pct)}</td>
            <td style="width:110px">
              <div class="uptime-bar-wrap">
                <div class="uptime-bar" style="width:${pct}%;background:${col}"></div>
              </div>
            </td>`;
  };

  for (const [id, cfg] of Object.entries(IFACES)) {
    const p24  = uptimePct(events, id, h24, now);
    const p7   = uptimePct(events, id, d7,  now);
    const p30  = uptimePct(events, id, d30, now);
    const pAll = uptimePct(events, id, all, now);
    const dt365 = downtimeMs(events, id, d365, now);
    body.insertAdjacentHTML('beforeend', `<tr>
      <td><span class="badge-iface ${id}">${cfg.label}</span></td>
      ${cell(p24)}${cell(p7)}${cell(p30)}${cell(pAll)}
      <td class="dur">${fmtDowntime(dt365)}</td>
    </tr>`);
  }
}

// ── Render: 7-day timeline ────────────────────────────────────────────────────

function renderTimeline(events) {
  const now = new Date();
  const start7 = new Date(now - 7 * 86400e3);
  const HOURS = 7 * 24;
  const HOUR_MS = 3600e3;

  const rowsEl  = document.getElementById('timeline-rows');
  const datesEl = document.getElementById('timeline-dates');
  rowsEl.innerHTML = '';

  for (const [id, cfg] of Object.entries(IFACES)) {
    let segs = '';
    for (let i = 0; i < HOURS; i++) {
      const segStart = new Date(start7.getTime() + i * HOUR_MS);
      const segEnd   = new Date(segStart.getTime() + HOUR_MS);
      const downS = Math.round(downtimeMs(events, id, segStart, segEnd) / 1000);
      let cls;
      if (downS === 0)      cls = 'up';
      else if (downS <= 30) cls = 'warn';
      else                  cls = 'down';
      const label = segStart.toLocaleString('cs-CZ', { ...CZ, weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit' });
      const title = downS > 0 ? `${label} · ${downS} s down` : `${label} · up`;
      segs += `<div class="tseg ${cls}" title="${title}"></div>`;
    }
    rowsEl.insertAdjacentHTML('beforeend', `
      <div class="timeline-row">
        <div class="timeline-lbl">${id.toUpperCase()}</div>
        <div class="timeline-bar">${segs}</div>
      </div>`);
  }

  // Date labels: 8 labels (one per day boundary)
  let labels = '';
  for (let d = 0; d <= 7; d++) {
    const t = new Date(start7.getTime() + d * 86400e3);
    labels += `<span>${t.toLocaleDateString('cs-CZ', { ...CZ, day: '2-digit', month: '2-digit' })}</span>`;
  }
  datesEl.innerHTML = labels;
}

// ── Render: 365-day daily timeline ────────────────────────────────────────────

function renderDailyTimeline(events) {
  const now = new Date();
  const start = new Date(now - 365 * 86400e3);
  const DAYS = 365;
  const DAY_MS = 86400e3;

  const rowsEl  = document.getElementById('timeline-rows-daily');
  const datesEl = document.getElementById('timeline-dates-daily');
  rowsEl.innerHTML = '';

  for (const [id, cfg] of Object.entries(IFACES)) {
    let segs = '';
    for (let i = 0; i < DAYS; i++) {
      const segStart = new Date(start.getTime() + i * DAY_MS);
      const segEnd   = new Date(segStart.getTime() + DAY_MS);
      const downS = Math.round(downtimeMs(events, id, segStart, segEnd) / 1000);
      let cls;
      if (downS <= 30)      cls = 'up';
      else if (downS <= 60) cls = 'warn';
      else                  cls = 'down';
      const label = segStart.toLocaleDateString('cs-CZ', { ...CZ, weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
      const title = downS > 0 ? `${label} · ${downS} s down` : `${label} · up`;
      segs += `<div class="tseg ${cls}" title="${title}"></div>`;
    }
    rowsEl.insertAdjacentHTML('beforeend', `
      <div class="timeline-row">
        <div class="timeline-lbl">${id.toUpperCase()}</div>
        <div class="timeline-bar">${segs}</div>
      </div>`);
  }

  // Month labels: 13 labels evenly spaced across 365 days
  let labels = '';
  const SPAN = 365 * DAY_MS;
  for (let m = 0; m <= 12; m++) {
    const t = new Date(start.getTime() + (m / 12) * SPAN);
    labels += `<span>${t.toLocaleDateString('en-US', { ...CZ, month: 'short', year: '2-digit' })}</span>`;
  }
  datesEl.innerHTML = labels;
}

// ── Render: Incidents ─────────────────────────────────────────────────────────

let allIncidents = [];
let filteredIncidents = [];
let incidentPage = 1;
let incidentFilter = 'all';
const PER_PAGE = 20;

function buildIncidents(events) {
  const incidents = [];
  const open = {};
  for (const ev of events) {
    if (ev.to === 'dead') {
      open[ev.iface] = ev;
    } else if (ev.to === 'alive' && open[ev.iface]) {
      incidents.push({ iface: ev.iface, down: open[ev.iface], up: ev });
      delete open[ev.iface];
    }
  }
  for (const [iface, down] of Object.entries(open)) {
    incidents.push({ iface, down, up: null });
  }
  incidents.sort((a, b) => new Date(b.down.ts) - new Date(a.down.ts));
  return incidents;
}

function renderIncidents(events) {
  allIncidents = buildIncidents(events);
  applyIncidentFilter();
}

function applyIncidentFilter() {
  filteredIncidents = incidentFilter === 'all'
    ? allIncidents
    : allIncidents.filter(i => i.iface === incidentFilter);
  incidentPage = 1;
  renderIncidentPage();
}

function renderIncidentPage() {
  const body = document.getElementById('incidents-body');
  const pag  = document.getElementById('incidents-pagination');

  if (!filteredIncidents.length) {
    body.innerHTML = '<tr class="empty-row"><td colspan="4">No incidents recorded</td></tr>';
    pag.innerHTML = '';
    return;
  }

  const totalPages = Math.ceil(filteredIncidents.length / PER_PAGE);
  const start = (incidentPage - 1) * PER_PAGE;
  const page  = filteredIncidents.slice(start, start + PER_PAGE);

  body.innerHTML = page.map(inc => {
    const downT = new Date(inc.down.ts);
    const upT   = inc.up ? new Date(inc.up.ts) : null;
    const dur   = upT ? upT - downT : null;
    const ongoing = !inc.up;
    return `<tr>
      <td>${fmtTs(downT)}</td>
      <td><span class="badge-iface ${inc.iface}">${inc.iface.toUpperCase()}</span></td>
      <td>
        <span class="ev-down">▼ DOWN</span>
        ${ongoing
          ? '<span class="ev-ongoing">● ongoing</span>'
          : upT ? ` → <span class="ev-up">▲ UP</span> ${fmtTs(upT)}` : ''}
      </td>
      <td class="dur">${fmtDur(dur)}</td>
    </tr>`;
  }).join('');

  pag.innerHTML = totalPages > 1
    ? `<button id="pg-prev" ${incidentPage <= 1 ? 'disabled' : ''}>&#9664; Prev</button>
       <span class="page-info">Page ${incidentPage} of ${totalPages}</span>
       <button id="pg-next" ${incidentPage >= totalPages ? 'disabled' : ''}>Next &#9654;</button>`
    : '';

  document.getElementById('pg-prev')?.addEventListener('click', () => { incidentPage--; renderIncidentPage(); });
  document.getElementById('pg-next')?.addEventListener('click', () => { incidentPage++; renderIncidentPage(); });
}

// ── Last poll status (from Worker KV) ─────────────────────────────────────────

const WORKER_URL = 'https://zatecka-check-now.michal-aftanas.workers.dev';

let lastPolledAt = null;

function renderCheckStatus() {
  const el = document.getElementById('check-status');
  if (!lastPolledAt) return;
  const diffS = Math.round((Date.now() - lastPolledAt) / 1000);
  let ago;
  if (diffS < 5)        ago = 'just now';
  else if (diffS < 60)  ago = diffS + ' s ago';
  else if (diffS < 3600) {
    const m = Math.floor(diffS / 60), s = diffS % 60;
    ago = m + ' min ' + s + ' s ago';
  } else {
    const h = Math.floor(diffS / 3600), m = Math.floor((diffS % 3600) / 60);
    ago = h + ' h ' + m + ' min ago';
  }
  const timeStr = lastPolledAt.toLocaleString('cs-CZ', { ...CZ, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  el.innerHTML = `Last checked: <span class="ok">${ago} (${timeStr})</span>`;
}

async function refreshCheckStatus() {
  try {
    const data = await fetch(WORKER_URL).then(r => r.json());
    if (!data.lastPolledAt) { document.getElementById('check-status').innerHTML = '<span>Not yet polled</span>'; return; }
    lastPolledAt = new Date(data.lastPolledAt);
    renderCheckStatus();
  } catch {
    document.getElementById('check-status').innerHTML = 'Last checked: <span>—</span>';
  }
}

// ── Main ──────────────────────────────────────────────────────────────────────

async function refresh() {
  try {
    const events = await loadEvents();
    renderCards(events);
    renderUptime(events);
    renderTimeline(events);
    renderDailyTimeline(events);
    renderIncidents(events);
  } catch (e) {
    console.error(e);
  }
}

document.getElementById('iface-filter').addEventListener('click', e => {
  const btn = e.target.closest('button[data-iface]');
  if (!btn) return;
  incidentFilter = btn.dataset.iface;
  document.querySelectorAll('#iface-filter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyIncidentFilter();
});

document.getElementById('btn-check').addEventListener('click', async () => {
  const btn = document.getElementById('btn-check');
  btn.textContent = '⟳ Triggering…';
  btn.disabled = true;
  try {
    const res = await fetch(WORKER_URL, { method: 'POST' });
    const data = await res.json();
    btn.textContent = data.ok ? '✓ Triggered' : '✗ Failed';
    if (data.ok) setTimeout(() => refreshCheckStatus(), 8000);
  } catch {
    btn.textContent = '✗ Error';
  }
  setTimeout(() => { btn.textContent = '⟳ Check now'; btn.disabled = false; }, 4000);
});

refresh();
refreshCheckStatus();
setInterval(refresh, 5 * 60 * 1000);
setInterval(refreshCheckStatus, 60 * 1000);  // re-fetch from Worker
setInterval(renderCheckStatus, 5 * 1000);    // re-render seconds counter
</script>
